name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: enimgrey
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build the Docker image
      run: |
        cd lifegoals
        docker build . --file Dockerfile --tag enimgrey/lifegoals:latest

    - name: Push Docker image
      run: |
        docker push enimgrey/lifegoals:latest
        docker tag enimgrey/lifegoals:latest enimgrey/lifegoals:${{ github.sha }}
        docker push enimgrey/lifegoals:${{ github.sha }}
